<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Vendas</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
    <header>
        <!-- Include header component -->
        <div id="header-placeholder"></div>
    </header>

    <main>
        <h1>Gerenciamento de Produtos</h1>
        <section id="produtos-lista">
            <h2>Lista de Produtos</h2>
            <button id="adicionar-produto">Adicionar Produto</button>
            <div id="produtos-container">
                <!-- Produtos serão carregados aqui -->
            </div>
        </section>

        <section id="recomendacoes">
            <h2>Produtos Recomendados</h2>
            <div id="produtos-recomendados">
                <!-- Produtos recomendados serão carregados aqui -->
            </div>
        </section>
    </main>

    <footer>
        <!-- Include footer component -->
        <div id="footer-placeholder"></div>
    </footer>

    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/slug-generator.js"></script>
</body>
</html>
